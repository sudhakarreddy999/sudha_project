<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Creative Art Prompt Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#6366f1', // Indigo 500
                        'primary-hover': '#4f46e5', // Indigo 600
                        dark: '#0f172a', // Slate 900
                        'dark-card': '#1e293b', // Slate 800
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons (Alternative to Lucide for CDN usage) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-dark dark:text-gray-100 transition-colors duration-300 min-h-screen font-sans antialiased flex flex-col">

    <!-- Header -->
    <header class="w-full py-4 px-6 flex justify-between items-center border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-dark-card shadow-sm z-10 sticky top-0 transition-colors duration-300">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-white shadow-lg">
                <i class="ph ph-magic-wand text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-purple-500 hidden sm:block">
                PromptGen AI
            </h1>
        </div>
        <div class="flex items-center gap-4">
            <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="Toggle Dark Mode">
                <i class="ph ph-moon text-xl dark:hidden"></i>
                <i class="ph ph-sun text-xl hidden dark:block"></i>
            </button>
            <a href="https://github.com" target="_blank" class="text-sm font-medium hover:text-indigo-500 transition-colors">GitHub</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-10 max-w-5xl flex flex-col lg:flex-row gap-8">
        
        <!-- Left Column: Generator -->
        <div class="w-full lg:w-3/5 space-y-6">
            <div class="bg-white dark:bg-dark-card rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 p-6 md:p-8 transition-colors duration-300">
                <div class="mb-8 text-center sm:text-left">
                    <h2 class="text-2xl sm:text-3xl font-bold mb-2">Create Art Prompts</h2>
                    <p class="text-gray-500 dark:text-gray-400">Generate high-quality, vivid drawing prompts in seconds using AI.</p>
                </div>

                <form id="generatorForm" class="space-y-5">
                    <!-- Theme Input -->
                    <div class="space-y-2">
                        <label for="themeInput" class="block text-sm font-semibold text-gray-700 dark:text-gray-300">Subject / Theme</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="ph ph-text-aa text-gray-400"></i>
                            </div>
                            <input type="text" id="themeInput" placeholder="e.g. A cyberpunk samurai, a peaceful forest..." 
                                class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all dark:text-white" required>
                            <button type="button" id="surpriseBtn" class="absolute inset-y-0 right-2 my-auto h-8 px-3 text-xs font-medium bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded-lg transition-colors flex items-center gap-1" title="Surprise Me">
                                <i class="ph ph-dice-five"></i> Random
                            </button>
                        </div>
                    </div>

                    <!-- Style Dropdown -->
                    <div class="space-y-2">
                        <label for="styleInput" class="block text-sm font-semibold text-gray-700 dark:text-gray-300">Art Style</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="ph ph-palette text-gray-400"></i>
                            </div>
                            <select id="styleInput" class="w-full pl-10 pr-10 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all appearance-none dark:text-white">
                                <option value="Any">Any Style</option>
                                <option value="Natural">Natural</option>
                                <option value="Fantasy">Fantasy</option>
                                <option value="Sci-Fi / Cyberpunk">Sci-Fi / Cyberpunk</option>
                                <option value="Anime / Manga">Anime / Manga</option>
                                <option value="Hyper-Realistic">Hyper-Realistic</option>
                                <option value="Watercolor">Watercolor</option>
                                <option value="Oil Painting">Oil Painting</option>
                                <option value="Minimalist Vector">Minimalist Vector</option>
                                <option value="Gothic Dark Art">Gothic Dark Art</option>
                                <option value="Steampunk">Steampunk</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                                <i class="ph ph-caret-down text-gray-400"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Generate Button -->
                    <button type="submit" id="generateBtn" class="w-full py-3.5 px-4 bg-primary hover:bg-primary-hover text-white rounded-xl font-medium shadow-md shadow-indigo-500/30 transition-all flex items-center justify-center gap-2 mt-4 relative overflow-hidden group">
                        <span class="relative z-10 flex items-center gap-2" id="btnText">
                            <i class="ph ph-sparkle text-lg"></i> Generate Prompt
                        </span>
                        <div id="loadingSpinner" class="hidden relative z-10 flex items-center gap-2">
                            <i class="ph ph-spinner-gap animate-spin text-xl"></i> Generating...
                        </div>
                        <div class="absolute inset-0 h-full w-full bg-white/20 scale-x-0 group-hover:scale-x-100 origin-left transition-transform duration-300 ease-out z-0"></div>
                    </button>
                    
                    <div id="errorMessage" class="hidden text-sm text-red-500 mt-2 text-center p-3 bg-red-50 dark:bg-red-900/20 rounded-lg border border-red-200 dark:border-red-800/50"></div>
                </form>
            </div>

            <!-- Result Section -->
            <div id="resultCard" class="bg-gradient-to-br from-indigo-50 to-purple-50 dark:from-gray-800 dark:to-gray-800 rounded-2xl shadow-sm border border-indigo-100 dark:border-gray-700 p-6 md:p-8 opacity-0 translate-y-4 transition-all duration-500 hidden">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="font-bold text-lg text-indigo-900 dark:text-indigo-300 flex items-center gap-2">
                        <i class="ph ph-check-circle text-green-500 text-xl"></i> Your Prompt
                    </h3>
                    <div class="flex gap-2">
                        <button id="copyBtn" class="p-2 bg-white dark:bg-gray-700 rounded-lg shadow-sm border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors text-gray-600 dark:text-gray-300" title="Copy to Clipboard">
                            <i class="ph ph-copy text-lg"></i>
                        </button>
                        <button id="exportBtn" class="p-2 bg-white dark:bg-gray-700 rounded-lg shadow-sm border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors text-gray-600 dark:text-gray-300" title="Export as TXT">
                            <i class="ph ph-download-simple text-lg"></i>
                        </button>
                    </div>
                </div>
                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-xl blur opacity-25 group-hover:opacity-40 transition duration-1000 group-hover:duration-200"></div>
                    <div class="relative bg-white dark:bg-gray-900 rounded-xl p-5 border border-indigo-100 dark:border-gray-700">
                        <p id="resultText" class="text-gray-800 dark:text-gray-200 leading-relaxed font-medium">
                            <!-- Generated text goes here -->
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: History -->
        <div class="w-full lg:w-2/5">
            <div class="bg-white dark:bg-dark-card rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 p-6 transition-colors duration-300 h-full flex flex-col max-h-[800px]">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-bold text-lg flex items-center gap-2">
                        <i class="ph ph-clock-counter-clockwise text-xl text-indigo-500"></i> Recent History
                    </h3>
                    <button id="refreshHistoryBtn" class="p-1.5 text-gray-400 hover:text-indigo-500 hover:bg-indigo-50 dark:hover:bg-gray-700 rounded-md transition-colors" title="Refresh History">
                        <i class="ph ph-arrows-clockwise text-lg"></i>
                    </button>
                </div>
                
                <div id="historyList" class="flex-grow overflow-y-auto pr-2 space-y-4 custom-scrollbar">
                    <!-- History items injected here -->
                    <div class="flex flex-col items-center justify-center h-full text-gray-400 space-y-3 opacity-60">
                        <i class="ph ph-tray text-4xl"></i>
                        <p class="text-sm">No history found</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="py-6 text-center text-sm text-gray-500 dark:text-gray-400 mt-auto border-t border-gray-200 dark:border-gray-800 bg-white dark:bg-dark-card transition-colors duration-300">
        <p>&copy; 2026 AI Creative Art Prompt Generator. All rights reserved.</p>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-xl flex items-center gap-3 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <i class="ph ph-check-circle text-green-400 text-xl"></i>
        <span id="toastMessage">Copied to clipboard!</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
